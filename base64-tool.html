<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 编解码工具 - 在线文本 Base64 转换</title>
  <meta name="description" content="免费的在线 Base64 编码和解码工具，支持文本实时转换，简单易用，无需安装。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">🔧 在线工具箱</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="json-formatter.html">JSON 格式化</a></li>
        <li><a href="base64-tool.html" class="active">Base64 工具</a></li>
        <li><a href="qr-generator.html">二维码生成</a></li>
        <li><a href="about.html">关于我们</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>Base64 编解码工具</h1>
      <p>文本与 Base64 编码互相转换，实时处理</p>
    </section>

    <div class="tool-layout">
      <div class="tool-main">
        <div class="form-group">
          <label>输入文本</label>
          <textarea id="textInput" placeholder="输入要编码或解码的文本..."></textarea>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="encodeBase64()">🔒 编码为 Base64</button>
          <button class="btn btn-primary" onclick="decodeBase64()">🔓 解码 Base64</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
          <button class="btn btn-secondary" onclick="copyResult()">📋 复制结果</button>
        </div>

        <div class="form-group">
          <label>转换结果</label>
          <div id="base64Result" class="result-box">结果将显示在这里...</div>
        </div>
      </div>

      <aside class="tool-sidebar">
        <div class="ads-container ads-sidebar">
          广告位预留<br>（AdSense 审核通过后可放置侧边栏广告）
        </div>
        <div class="ads-container ads-sidebar">
          广告位预留
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>在线工具箱 - 免费实用的在线工具集合</p>
      <div class="footer-links">
        <a href="about.html">关于我们</a>
        <a href="privacy.html">隐私政策</a>
        <a href="index.html">网站首页</a>
      </div>
    </div>
  </footer>

  <script>
    function encodeBase64() {
      const input = document.getElementById('textInput').value;
      const resultBox = document.getElementById('base64Result');
      if (!input) {
        resultBox.textContent = '请输入要编码的文本';
        return;
      }
      try {
        const encoded = btoa(unescape(encodeURIComponent(input)));
        resultBox.textContent = encoded;
      } catch (e) {
        resultBox.textContent = '❌ 编码失败：' + e.message;
      }
    }

    function decodeBase64() {
      const input = document.getElementById('textInput').value.trim();
      const resultBox = document.getElementById('base64Result');
      if (!input) {
        resultBox.textContent = '请输入要解码的 Base64 字符串';
        return;
      }
      try {
        const decoded = decodeURIComponent(escape(atob(input)));
        resultBox.textContent = decoded;
      } catch (e) {
        resultBox.textContent = '❌ 解码失败：无效的 Base64 字符串';
      }
    }

    function clearAll() {
      document.getElementById('textInput').value = '';
      document.getElementById('base64Result').textContent = '结果将显示在这里...';
    }

    function copyResult() {
      const result = document.getElementById('base64Result').textContent;
      if (result === '结果将显示在这里...') return;
      navigator.clipboard.writeText(result).then(() => {
        alert('已复制到剪贴板');
      });
    }
  </script>
</body>
</html>
