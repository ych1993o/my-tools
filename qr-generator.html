<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1960589035364427"
       crossorigin="anonymous"></script>
  <title>二维码生成器 - 免费在线生成高清二维码</title>
  <meta name="description" content="免费的在线二维码生成工具，输入文本或网址即可即时生成高清二维码图片，支持下载保存到本地。">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">🔧 在线工具箱</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="json-formatter.html">JSON 格式化</a></li>
        <li><a href="base64-tool.html">Base64 工具</a></li>
        <li><a href="qr-generator.html" class="active">二维码生成</a></li>
        <li><a href="about.html">关于我们</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>二维码生成器</h1>
      <p>输入文本或网址，即时生成高清二维码图片</p>
    </section>

    <div class="tool-layout">
      <div class="tool-main">
        <div class="form-group">
          <label>输入内容（文本、网址等）</label>
          <textarea id="qrInput" placeholder="输入要生成二维码的内容，例如：https://www.example.com"></textarea>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="generateQR()">📱 生成二维码</button>
          <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清空</button>
          <button class="btn btn-secondary" onclick="downloadQR()" id="downloadBtn" style="display:none;">💾 下载图片</button>
        </div>

        <div class="form-group">
          <label>生成的二维码</label>
          <div id="qrResult" class="result-box" style="display:flex;align-items:center;justify-content:center;min-height:250px;">
            二维码将显示在这里...
          </div>
        </div>
      </div>

      <aside class="tool-sidebar">
        <div class="ads-container ads-sidebar">
          广告位预留<br>（AdSense 审核通过后可放置侧边栏广告）
        </div>
        <div class="ads-container ads-sidebar">
          广告位预留
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p>在线工具箱 - 免费实用的在线工具集合</p>
      <div class="footer-links">
        <a href="about.html">关于我们</a>
        <a href="privacy.html">隐私政策</a>
        <a href="index.html">网站首页</a>
      </div>
    </div>
  </footer>

  <script>
    let currentQR = null;

    function generateQR() {
      const input = document.getElementById('qrInput').value.trim();
      const resultBox = document.getElementById('qrResult');
      const downloadBtn = document.getElementById('downloadBtn');

      if (!input) {
        resultBox.innerHTML = '请输入要生成二维码的内容';
        downloadBtn.style.display = 'none';
        return;
      }

      resultBox.innerHTML = '';
      currentQR = new QRCode(resultBox, {
        text: input,
        width: 200,
        height: 200,
        colorDark: '#0f172a',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });

      downloadBtn.style.display = 'inline-flex';
    }

    function clearAll() {
      document.getElementById('qrInput').value = '';
      document.getElementById('qrResult').innerHTML = '二维码将显示在这里...';
      document.getElementById('downloadBtn').style.display = 'none';
      currentQR = null;
    }

    function downloadQR() {
      const resultBox = document.getElementById('qrResult');
      const img = resultBox.querySelector('img');
      if (img && img.src) {
        const link = document.createElement('a');
        link.href = img.src;
        link.download = 'qrcode.png';
        link.click();
      }
    }
  </script>
</body>
</html>
